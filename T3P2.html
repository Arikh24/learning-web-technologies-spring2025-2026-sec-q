<!DOCTYPE html>
<html>  
    <head>  
        <title> Js Lab Task 3 Paze 2</title>
    </head>
    <body>
         <form  onsubmit="return validateEmail();"> 
         <label>Email</label><br>
        <input type="email" name="email" id="email"placeholder="sample@example.com"><br>
        <input type="submit" value="submit">
        </form>
        <script>    
            function validateEmail()
            {
                let email=document.getElementById("email").value.trim();
                if(email=="")
            {
                alert("Email Cannot be Empty");
                return false;
            }
            if (!email.includes('@') || !email.includes('.'))
            {
                alert("Wrong Email");
                return false;
            }
            else
            {
                alert("Valid Email");
                return true;
            }
            }
        </script>
    </body>
</html>
