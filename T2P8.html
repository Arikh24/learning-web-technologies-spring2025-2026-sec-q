<!DOCTYPE html>
<html>  
    <head>  
        <title>Person profile Form</title>
    </head>
    <body>
        <form> 
         <label>Name </label> <br>
        <input type ="text" name="username"><br>
         <label>Email</label><br>
        <input type="email" name="email" placeholder="sample@example.com"><br>
        <label>Gender</label><br>
         <input type="ratio" name="gender" value="male">Male<br>
         <input type="ratio" name="gender" value="female">Female<br>
         <input type="ratio" name="gender" value="other">Other<br>
        <label>Date Of Birth </label> <br>
        <input type ="date" name="dob"><br>
        <label>Blood Group</label> <br>
        <select name="bloodgroup">
         <option value="A+">A+</option>
        <option value="A-">A-</option>
        <option value="B+">B+</option>
         <option value="B-">B-</option>
         <option value="O+">O+</option>
         <option value="O-">O-</option>
         <option value="AB+">AB+</option>
         <option value="AB-">AB-</option>
        </select><br>
        <label>Degree </label> <br>
        <input type ="checkbox" name="degree"value="SSC">SSC<br>
        <input type ="checkbox" name="degree"value="HSC">HSC<br>
        <input type ="checkbox" name="degree"value="BSC">BSC<br>
        <input type="submit" value="submit">
        <input type="reset" value="reset">
        </form>
       
    </body>
</html>
